<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enregistrement des membres du groupe Keyce KIAI — Rejoignez la communauté étudiante.">
    <title>Inscription — Keyce KIAI</title>

    <!-- Google Fonts : Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Feuille de style -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <main class="container">
        <div class="card">

            <!-- ===== En-tête ===== -->
            <header class="card-header">
                <div class="icon-wrapper">
                    <!-- Icône SVG : groupe de personnes -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87
                                 m5-1.13a4 4 0 100-8 4 4 0 000 8zm6 0a4 4 0 100-8"/>
                    </svg>
                </div>
                <h1>Nouveau Membre</h1>
                <p>Rejoignez le groupe Keyce KIAI</p>
            </header>

            <!-- ===== Formulaire ===== -->
            <form id="registration-form" novalidate>

                <!-- Champ : Nom -->
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" autocomplete="family-name" required>
                    </div>
                    <span class="error-hint" aria-live="polite"></span>
                </div>

                <!-- Champ : Prénom -->
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom" autocomplete="given-name" required>
                    </div>
                    <span class="error-hint" aria-live="polite"></span>
                </div>

                <!-- Champ : Téléphone -->
                <div class="form-group">
                    <label for="telephone">Numéro de téléphone</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                        </svg>
                        <input type="tel" id="telephone" name="telephone" placeholder="Ex : 6XXXXXXXX" autocomplete="tel" required>
                    </div>
                    <span class="error-hint" aria-live="polite"></span>
                </div>

                <!-- Bouton d'envoi -->
                <button type="submit" id="btn-submit" class="btn-submit">
                    <span class="btn-text">Enregistrer</span>
                    <span class="spinner" aria-hidden="true"></span>
                </button>

            </form>

            <!-- ===== Message de feedback ===== -->
            <div id="feedback-message" class="feedback-message" role="alert">
                <svg id="feedback-icon-svg" class="feedback-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"></svg>
                <span id="feedback-text"></span>
            </div>

            <!-- ===== Footer ===== -->
            <footer class="card-footer">
                <p><span class="brand">Keyce KIAI</span> — Communauté étudiante</p>
            </footer>

        </div>
    </main>

    <!-- Script -->
    <script src="assets/js/app.js"></script>

</body>
</html>
