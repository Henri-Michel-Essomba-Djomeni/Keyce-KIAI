<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Enregistrement des membres du groupe Keyce KIAI — Rejoignez la communauté étudiante.">
    <title>Inscription — Keyce KIAI</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Feuille de style -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <main class="container">
        <div class="layout-grid">

            <!-- ===== Colonne 1 : Inscription ===== -->
            <section class="card registration-section">
                <header class="card-header">
                    <div class="icon-wrapper">
                        <!-- Icône SVG : groupe de personnes -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87
                                     m5-1.13a4 4 0 100-8 4 4 0 000 8zm6 0a4 4 0 100-8" />
                        </svg>
                    </div>
                    <h1>Nouveau Membre</h1>
                    <p>Rejoignez le groupe Keyce KIAI</p>
                </header>

                <form id="registration-form" novalidate>
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" autocomplete="family-name"
                                required>
                        </div>
                        <span class="error-hint" aria-live="polite"></span>
                    </div>

                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom"
                                autocomplete="given-name" required>
                        </div>
                        <span class="error-hint" aria-live="polite"></span>
                    </div>

                    <div class="form-group">
                        <label for="telephone">Numéro de téléphone</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                            <input type="tel" id="telephone" name="telephone" placeholder="Ex : 6XXXXXXXX"
                                autocomplete="tel" required>
                        </div>
                        <span class="error-hint" aria-live="polite"></span>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-submit">
                        <span class="btn-text">Enregistrer</span>
                        <span class="spinner" aria-hidden="true"></span>
                    </button>
                </form>

                <div id="feedback-message" class="feedback-message" role="alert">
                    <svg id="feedback-icon-svg" class="feedback-icon" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"></svg>
                    <span id="feedback-text"></span>
                </div>
            </section>

            <!-- ===== Colonne 2 : Liste des Membres ===== -->
            <section class="card members-section">
                <div class="members-header">
                    <div class="header-group">
                        <h2>Membres</h2>
                        <div class="search-container">
                            <input type="text" id="member-search" placeholder="Rechercher..." class="search-input">
                            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="members-header-actions">
                    <button id="select-btn" class="btn-select" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                        </svg>
                        <span id="select-btn-text">Sélectionner</span>
                    </button>
                    <button id="refresh-btn" class="btn-refresh" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                
                <div id="members-list" class="members-list">
                    <!-- Les membres seront chargés ici -->
                </div>

                <div class="selection-actions" id="selection-actions" style="display: none;">
                    <button id="delete-btn" class="btn-delete" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                    <button id="create-group-btn" class="btn-create-group" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 4v16m8-8H4" />
                        </svg>
                        Groupe
                    </button>
                </div>
            </section>

            <!-- ===== Colonne 3 : Liste des Groupes ===== -->
            <section class="card groups-section">
                <div class="groups-header">
                    <div class="header-group">
                        <h2>Groupes</h2>
                        <div class="search-container">
                            <input type="text" id="group-search" placeholder="Rechercher..." class="search-input">
                            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="groups-header-actions">
                    <button id="select-groups-btn" class="btn-select" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                        </svg>
                        <span id="select-groups-btn-text">Sélectionner</span>
                    </button>
                    <button id="refresh-groups-btn" class="btn-refresh" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                <div id="groups-list" class="groups-list">
                    <!-- Les groupes seront chargés ici -->
                </div>
                <div class="selection-actions" id="selection-actions-groups" style="display: none;">
                    <button id="delete-groups-btn" class="btn-delete" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </section>
        </div>

        <!-- ===== Footer ===== -->
        <footer class="card-footer">
            <p><span class="brand">Keyce KIAI</span> — Communauté étudiante</p>
        </footer>
    </main>

    <!-- ===== Modal Création Groupe ===== -->
    <div id="create-group-modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Nouveau Groupe</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </header>
            <form id="create-group-form">
                <div class="form-group">
                    <label for="group-nom">Nom du groupe</label>
                    <input type="text" id="group-nom" name="nom" placeholder="Ex : KIAI 2026" required>
                </div>
                <div class="form-group">
                    <label for="group-description">Description</label>
                    <textarea id="group-description" name="description" placeholder="Courte description du groupe..."
                        rows="3"></textarea>
                </div>
                <div class="selected-members-container">
                    <label>Membres sélectionnés (<span id="selected-count">0</span>)</label>
                    <div id="selected-members-preview" class="selected-members-preview">
                        <!-- Liste des membres sélectionnés -->
                    </div>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="btn-text">Créer le groupe</span>
                    <span class="spinner"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script src="assets/js/app.js"></script>

</body>

</html>
